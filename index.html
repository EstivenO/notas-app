<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicacion de seguimiento de Calificaciones</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer ></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="header__title">Seguimiento de Calificaciones</h1>
            <p class="header__content">En este proyecto, se pretende gestionar el nivel academico que se lleva en las diferentes areas, para de esta manera tomar decisiones estrategicas de mejora u oportunidad</p>
            <img class="header__img" src="assets/icons/calificacion.png" alt="imagen de nina sosteniendo las calificaciones">
        </div>
    </header>
    <main>
        <div class="container">
            <section class="form">
                <form action="">
                    <fieldset class="form__fieldset">
                        <legend class="form__legend">Ingreso de Materia</legend>
                        <div class="form__Materia">
                            <label class="form__label" for="inputMateria">Materia:</label>
                            <input class="form__input" type="text" name="inputMateria" id="inputMateria" placeholder="Ingresa la Materia a la cual le vamos agregar la Calificacion">
                        </div>
                        <div class="form__Calificacion">
                            <label class="form__label" for="inputCalificacion">Calificacion:</label>
                            <input class="form__input" type="number" name="inputCalificacion" id="inputCalificacion" placeholder="Ingresa la Caificacion optenida en la materia">
                        </div>
                        
                        <button class="form__button" id="btnAgregar" type="button">Agregar</button>
                    </fieldset>
                </form>
            </section>
            <section class="materias">
                <h2 class="materias__title">Materias</h2>
                <div class="materias__container" id="listaMaterias" role="list">
                    <article class="materia">
                        <div class="materia__header">
                            <h2 class="materia__title">Matematicas</h2>
                            <img src="assets/icons/star.svg" class="materia__star" alt="estrella de prioidad">
                        </div>
                        <p class="materia__content"> 3.9</p>
                    </article>
                    <p class="materias__msj" id="mensaje"></p>                    
                </div>
                
            </section>
        </div>
    </main>
    <footer>
        <div class="container">
            <h2 class="footer__title">Estiven Ortiz Z</h2>
        </div>
    </footer>
</body>
</html>
